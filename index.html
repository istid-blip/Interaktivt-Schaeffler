<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktivt Schaeffler-diagram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .controls {
            flex: 1;
            min-width: 280px;
        }
        .canvas-container {
            flex: 2;
            min-width: 480px;
        }
        canvas {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            height: auto;
        }
        .slider-group {
            margin-bottom: 15px;
        }
        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 5px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h2>Interaktivt Schaeffler-diagram</h2>
    <p>Juster legeringselementene for å se fasestrukturen. Diagrammet er i sort-hvitt med linjer for konstant ferritt-innhold.</p>

    <div class="container">
        <div class="controls" id="controls">
            </div>

        <div class="canvas-container">
            <canvas id="schaefflerCanvas" width="650" height="500"></canvas>
            
            <div class="results">
                <strong>Kromekvivalent (Cr<sub>ekv</sub>): </strong> <span id="crEqOut">0.0</span><br>
                <strong>Nikkelekvivalent (Ni<sub>ekv</sub>): </strong> <span id="niEqOut">0.0</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('schaefflerCanvas');
        const ctx = canvas.getContext('2d');

        // Startverdier (Typisk 304 Austenittisk) + Niob (Nb)
        const elements = {
            Cr: { value: 18.0, min: 0, max: 40, step: 0.1 },
            Ni: { value: 8.0, min: 0, max: 30, step: 0.1 },
            Mo: { value: 0.0, min: 0, max: 10, step: 0.1 },
            Si: { value: 0.5, min: 0, max: 5, step: 0.1 },
            C:  { value: 0.08, min: 0, max: 1.0, step: 0.01 },
            Mn: { value: 1.5, min: 0, max: 10, step: 0.1 },
            Nb: { value: 0.0, min: 0, max: 2.0, step: 0.01 } // Nytt element: Niob
        };

        const maxCr = 40;
        const maxNi = 30;
        const margin = 60;
        const plotWidth = canvas.width - margin * 2;
        const plotHeight = canvas.height - margin * 2;

        // Bygg glidebrytere
        const controlsDiv = document.getElementById('controls');
        for (const [key, data] of Object.entries(elements)) {
            const group = document.createElement('div');
            group.className = 'slider-group';
            group.innerHTML = `
                <label for="${key}">${key} (%) <span id="${key}-val">${data.value}</span></label>
                <input type="range" id="${key}" min="${data.min}" max="${data.max}" step="${data.step}" value="${data.value}">
            `;
            controlsDiv.appendChild(group);

            document.getElementById(key).addEventListener('input', function(e) {
                elements[key].value = parseFloat(e.target.value);
                const decimalPlaces = (key === 'C' || key === 'Nb') ? 2 : 1;
                document.getElementById(`${key}-val`).innerText = elements[key].value.toFixed(decimalPlaces);
                updateDiagram();
            });
        }

        function getCoords(crEq, niEq) {
            const x = margin + (crEq / maxCr) * plotWidth;
            const y = canvas.height - margin - (niEq / maxNi) * plotHeight;
            return { x, y };
        }

        // Tegn fasedelingene (Tilnærmet Schaeffler-geometri) og konstant ferrittlinjer
        function drawPhases() {
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 1;
            ctx.fillStyle = "#333";
            ctx.font = "bold 15px Arial";

            // Faseetiketter (plassert presist)
            const aPos = getCoords(17, 22); ctx.fillText("Austenitt", aPos.x, aPos.y);
            const mPos = getCoords(2, 6); ctx.fillText("Martensitt", mPos.x, mPos.y);
            const fPos = getCoords(32, 2); ctx.fillText("Ferritt", fPos.x, fPos.y);

            // Mixed Phases
            ctx.font = "italic 13px Arial";
            const amPos = getCoords(4, 15); ctx.fillText("A+M", amPos.x, amPos.y);
            const mfPos = getCoords(13, 2); ctx.fillText("M+F", mfPos.x, mfPos.y);
            const afPos = getCoords(26, 15); ctx.fillText("A+F", afPos.x, afPos.y);
            const amfPos = getCoords(13, 7); ctx.fillText("A+M+F", amfPos.x, amfPos.y);
            const fmPos = getCoords(1, 1); ctx.fillText("F+M", fmPos.x, fmPos.y); // Liten region nede til venstre

            // Tegn linjer for fasedelingene (kopiert fra diagrammet ditt)
            ctx.lineWidth = 1.5;

            // Martensitt-grense
            ctx.beginPath(); const mStart = getCoords(0, 8); ctx.moveTo(mStart.x, mStart.y);
            const mEnd = getCoords(2.2, 0); ctx.lineTo(mEnd.x, mEnd.y); ctx.stroke();

            // M+F, A+M+F grenser
            ctx.beginPath(); const amfStart = getCoords(0, 0); ctx.moveTo(amfStart.x, amfStart.y);
            const amfMid1 = getCoords(9, 3); ctx.lineTo(amfMid1.x, amfMid1.y); 
            const amfMid2 = getCoords(12, 0); ctx.lineTo(amfMid2.x, amfMid2.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(amfMid1.x, amfMid1.y); 
            const amfEnd = getCoords(16, 4); ctx.lineTo(amfEnd.x, amfEnd.y); ctx.stroke();

            // A+M grense
            ctx.beginPath(); const amStart2 = getCoords(0, 19); ctx.moveTo(amStart2.x, amStart2.y);
            const amEnd2 = getCoords(13.8, 5.2); ctx.lineTo(amEnd2.x, amEnd2.y); ctx.stroke();

            // A+F grense
            ctx.beginPath(); const afStart2 = getCoords(0, 25.4); ctx.moveTo(afStart2.x, afStart2.y);
            const afEnd2 = getCoords(18, 10); ctx.lineTo(afEnd2.x, afEnd2.y); ctx.stroke();

            // Linjer for konstant ferritt-innhold
            ctx.lineWidth = 1;
            ctx.font = "11px Arial";
            const ferriteLines = [
                { startCr: 14, endCr: 40, endNi: 14, label: "0% Ferritt", labelCr: 28, labelNi: 20 },
                { startCr: 16, endCr: 40, endNi: 10, label: "5% Ferritt", labelCr: 28, labelNi: 15 },
                { startCr: 18, endCr: 40, endNi: 7, label: "10% Ferritt", labelCr: 28, labelNi: 11 },
                { startCr: 20.5, endCr: 40, endNi: 4, label: "20% Ferritt", labelCr: 28, labelNi: 7 },
                { startCr: 24, endCr: 40, endNi: 1.8, label: "40% Ferritt", labelCr: 28, labelNi: 3.5 },
                { startCr: 28.5, endCr: 40, endNi: 0, label: "80% Ferritt", labelCr: 32.5, labelNi: 0.8 },
                { startCr: 36, endCr: 40, endNi: 0, label: "100% Ferritt", labelCr: 37, labelNi: 0.4 }
            ];

            ferriteLines.forEach(line => {
                ctx.beginPath();
                const start = getCoords(line.startCr, 0);
                const end = getCoords(line.endCr, line.endNi);
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();

                // Etikett for ferritt-prosent
                const labelPos = getCoords(line.labelCr, line.labelNi);
                ctx.save();
                ctx.translate(labelPos.x, labelPos.y);
                const angle = Math.atan2(end.y - start.y, end.x - start.x);
                ctx.rotate(angle);
                ctx.fillStyle = "#333";
                ctx.fillText(line.label, 0, -4);
                ctx.restore();
            });
        }

        function drawGrid() {
            ctx.strokeStyle = "#e0e0e0";
            ctx.lineWidth = 1;
            ctx.font = "12px Arial";
            ctx.fillStyle = "#666";

            // X-akse
            for (let i = 0; i <= maxCr; i += 5) {
                const x = margin + (i / maxCr) * plotWidth;
                ctx.beginPath(); ctx.moveTo(x, margin); ctx.lineTo(x, canvas.height - margin); ctx.stroke();
                ctx.fillText(i, x - 5, canvas.height - margin + 15);
            }

            // Y-akse
            for (let i = 0; i <= maxNi; i += 5) {
                const y = canvas.height - margin - (i / maxNi) * plotHeight;
                ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(canvas.width - margin, y); ctx.stroke();
                if (i > 0) ctx.fillText(i, margin - 20, y + 4);
            }

            // Hovedakser
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin, margin);
            ctx.lineTo(margin, canvas.height - margin);
            ctx.lineTo(canvas.width - margin, canvas.height - margin);
            ctx.stroke();

            // Aksetitler og formler fra diagrammet ditt
            ctx.fillStyle = "black";
            ctx.font = "bold 14px Arial";
            // Oppdatert formel for Kromekvivalent (inkl Nb)
            ctx.fillText("Kromekvivalent = % Cr + % Mo + 1,5 x % Si + 0,5 x % Nb", canvas.width / 2 - 170, canvas.height - 10);
            ctx.save();
            ctx.translate(15, canvas.height / 2 + 100);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText("Nikkelekvivalent = % Ni + 30 x % C + 0,5 x % Mn", 0, 0);
            ctx.restore();

            // Diagramtittel
            ctx.font = "bold 16px Arial";
            ctx.fillText("Schaeffler-diagram", canvas.width / 2 - 80, 20);
        }

        function updateDiagram() {
            // Beregn ekvivalenter (inkludert Nb)
            const crEq = elements.Cr.value + elements.Mo.value + 1.5 * elements.Si.value + 0.5 * elements.Nb.value;
            const niEq = elements.Ni.value + 30 * elements.C.value + 0.5 * elements.Mn.value;

            document.getElementById('crEqOut').innerText = crEq.toFixed(2);
            document.getElementById('niEqOut').innerText = niEq.toFixed(2);

            // Tøm canvas og tegn alt på nytt
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPhases(); // Først fasedelinger (sorte linjer)
            drawGrid(); // Så akser og tittel

            // Plott resultatet (rødt punkt)
            const coords = getCoords(crEq, niEq);
            ctx.beginPath();
            ctx.arc(coords.x, coords.y, 8, 0, 2 * Math.PI);
            ctx.fillStyle = "#e74c3c"; // Rød farge for punktet
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#c0392b"; // Mørkere rød kant
            ctx.stroke();

            // Etikett ved siden av punktet
            ctx.fillStyle = "#000";
            ctx.font = "bold 13px Arial";
            
            // Juster tekstposisjon hvis den er nær høyre kant
            let textX = coords.x + 12;
            if(crEq > 35) textX = coords.x - 70;
            ctx.fillText(`(${crEq.toFixed(1)}, ${niEq.toFixed(1)})`, textX, coords.y - 12);
        }

        // Kjør første gang
        updateDiagram();
    </script>
</body>
</html>
