<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktivt Schaeffler-diagram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .controls {
            flex: 1;
            min-width: 280px;
        }
        .canvas-container {
            flex: 2;
            min-width: 480px;
        }
        canvas {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            height: auto;
        }
        .slider-group {
            margin-bottom: 15px;
        }
        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 5px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h2>Interaktivt Schaeffler-diagram</h2>
    <p>Juster legeringselementene for å se fasestrukturen. Diagrammet er i sort-hvitt med linjer for konstant ferritt-innhold.</p>

    <div class="container">
        <div class="controls" id="controls">
            </div>

        <div class="canvas-container">
            <canvas id="schaefflerCanvas" width="650" height="500"></canvas>
            
            <div class="results">
                <strong>Kromekvivalent (Cr<sub>ekv</sub>): </strong> <span id="crEqOut">0.0</span><br>
                <strong>Nikkelekvivalent (Ni<sub>ekv</sub>): </strong> <span id="niEqOut">0.0</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('schaefflerCanvas');
        const ctx = canvas.getContext('2d');

        // Startverdier (Typisk 304 Austenittisk) + Niob (Nb)
        const elements = {
            Cr: { value: 18.0, min: 0, max: 40, step: 0.1 },
            Ni: { value: 8.0, min: 0, max: 30, step: 0.1 },
            Mo: { value: 0.0, min: 0, max: 10, step: 0.1 },
            Si: { value: 0.5, min: 0, max: 5, step: 0.1 },
            C:  { value: 0.08, min: 0, max: 1.0, step: 0.01 },
            Mn: { value: 1.5, min: 0, max: 10, step: 0.1 },
            Nb: { value: 0.0, min: 0, max: 2.0, step: 0.01 } // Nytt element: Niob
        };

        const maxCr = 40;
        const maxNi = 30;
        const margin = 60;
        const plotWidth = canvas.width - margin * 2;
        const plotHeight = canvas.height - margin * 2;

        // Bygg glidebrytere
        const controlsDiv = document.getElementById('controls');
        for (const [key, data] of Object.entries(elements)) {
            const group = document.createElement('div');
            group.className = 'slider-group';
            group.innerHTML = `
                <label for="${key}">${key} (%) <span id="${key}-val">${data.value}</span></label>
                <input type="range" id="${key}" min="${data.min}" max="${data.max}" step="${data.step}" value="${data.value}">
            `;
            controlsDiv.appendChild(group);

            document.getElementById(key).addEventListener('input', function(e) {
                elements[key].value = parseFloat(e.target.value);
                const decimalPlaces = (key === 'C' || key === 'Nb') ? 2 : 1;
                document.getElementById(`${key}-val`).innerText = elements[key].value.toFixed(decimalPlaces);
                updateDiagram();
            });
        }

        function getCoords(crEq, niEq) {
            const x = margin + (crEq / maxCr) * plotWidth;
            const y = canvas.height - margin - (niEq / maxNi) * plotHeight;
            return { x, y };
        }

// Tegn fasedelingene (Beregnet nøyaktig fra originaldiagrammet)
        function drawPhases() {
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 1;
            ctx.fillStyle = "#333";
            
            // --- FASEETIKETTER ---
            ctx.font = "bold 15px Arial";
            const aPos = getCoords(16, 22); ctx.fillText("Austenit", aPos.x, aPos.y);
            const mPos = getCoords(4, 8); ctx.fillText("Martensit", mPos.x, mPos.y);
            const fPos = getCoords(34, 2.5); ctx.fillText("Ferrit", fPos.x, fPos.y);

            ctx.font = "14px Arial";
            const amPos = getCoords(6, 16); ctx.fillText("A + M", amPos.x, amPos.y);
            const mfPos = getCoords(13, 2.5); ctx.fillText("M + F", mfPos.x, mfPos.y);
            const afPos = getCoords(27, 13); ctx.fillText("A + F", afPos.x, afPos.y);
            const amfPos = getCoords(18, 7); ctx.fillText("A+M+F", amfPos.x, amfPos.y);
            
            // F + M er rotert på høykant
            ctx.save();
            const fmPos = getCoords(1.5, 2); 
            ctx.translate(fmPos.x, fmPos.y);
            ctx.rotate(Math.PI / 2);
            ctx.fillText("F + M", 0, 0); 
            ctx.restore();

            // --- HOVEDGRENSER (De tykke linjene) ---
            ctx.lineWidth = 1.5;

            // 1. F+M grense nede til venstre
            ctx.beginPath(); const l_e_start = getCoords(0, 8); ctx.moveTo(l_e_start.x, l_e_start.y);
            const l_e_end = getCoords(2.2, 0); ctx.lineTo(l_e_end.x, l_e_end.y); ctx.stroke();

            // 2. Austenit / A+F (Den øverste lange skrålinjen)
            ctx.beginPath(); const l_a_start = getCoords(0, 25.5); ctx.moveTo(l_a_start.x, l_a_start.y);
            const l_a_end = getCoords(26.0, 4.5); ctx.lineTo(l_a_end.x, l_a_end.y); ctx.stroke();

            // 3. A+M / M grense (Kommer fra X=0, STOPPER ved A+M+F hjørnet!)
            ctx.beginPath(); const l_b_start = getCoords(0, 19.5); ctx.moveTo(l_b_start.x, l_b_start.y);
            const l_b_end = getCoords(13.32, 8.74); ctx.lineTo(l_b_end.x, l_b_end.y); ctx.stroke();

            // 4. M / M+F grense (Kommer fra bunnen, STOPPER ved samme A+M+F hjørne!)
            ctx.beginPath(); const l_c_start = getCoords(8, 0); ctx.moveTo(l_c_start.x, l_c_start.y);
            const l_c_end = getCoords(13.32, 8.74); ctx.lineTo(l_c_end.x, l_c_end.y); ctx.stroke();

            // 5. M+F / A+M+F grense (Bunnlinjen til selve A+M+F trekanten)
            ctx.beginPath(); ctx.moveTo(l_c_end.x, l_c_end.y); 
            ctx.lineTo(l_a_end.x, l_a_end.y); ctx.stroke();

            // 6. Bunnlinjen mot Ferrit
            ctx.beginPath(); const l_d_start = getCoords(12, 0); ctx.moveTo(l_d_start.x, l_d_start.y);
            const l_d_end = getCoords(40, 9.0); ctx.lineTo(l_d_end.x, l_d_end.y); ctx.stroke();


            // --- FERRITTLINJER (De tynne linjene ned til X-aksen) ---
            ctx.lineWidth = 1;
            ctx.font = "13px Arial";
            
            const ferriteLines = [
                { startCr: 7.0,  startNi: 0, endCr: 28.7, endNi: 30.0, label: "0% Ferrit", labelCr: 25.0, labelNi: 24.8 },
                { startCr: 7.8,  startNi: 0, endCr: 30.7, endNi: 30.0, label: "5%",        labelCr: 27.0, labelNi: 25.1 },
                { startCr: 8.8,  startNi: 0, endCr: 32.8, endNi: 30.0, label: "10%",       labelCr: 29.0, labelNi: 25.3 },
                { startCr: 9.8,  startNi: 0, endCr: 36.5, endNi: 30.0, label: "20%",       labelCr: 31.0, labelNi: 23.9 },
                { startCr: 10.5, startNi: 0, endCr: 40.0, endNi: 26.6, label: "40%",       labelCr: 33.0, labelNi: 20.3 },
                { startCr: 11.5, startNi: 0, endCr: 40.0, endNi: 18.6, label: "80%",       labelCr: 34.0, labelNi: 14.7 },
                { startCr: 12.0, startNi: 0, endCr: 40.0, endNi: 9.0,  label: "100%",      labelCr: 36.0, labelNi: 7.7 }
            ];

            ferriteLines.forEach(line => {
                ctx.beginPath();
                const start = getCoords(line.startCr, line.startNi);
                const end = getCoords(line.endCr, line.endNi);
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();

                // Plasserer teksten i samme vinkel som strekene
                const labelPos = getCoords(line.labelCr, line.labelNi);
                ctx.save();
                ctx.translate(labelPos.x, labelPos.y);
                const angle = Math.atan2(end.y - start.y, end.x - start.x);
                ctx.rotate(angle);
                ctx.fillStyle = "#000";
                ctx.fillText(line.label, 0, -5);
                ctx.restore();
            });
        }

        function drawGrid() {
            ctx.strokeStyle = "#e0e0e0";
            ctx.lineWidth = 1;
            ctx.font = "12px Arial";
            ctx.fillStyle = "#666";

            // X-akse
            for (let i = 0; i <= maxCr; i += 5) {
                const x = margin + (i / maxCr) * plotWidth;
                ctx.beginPath(); ctx.moveTo(x, margin); ctx.lineTo(x, canvas.height - margin); ctx.stroke();
                ctx.fillText(i, x - 5, canvas.height - margin + 15);
            }

            // Y-akse
            for (let i = 0; i <= maxNi; i += 5) {
                const y = canvas.height - margin - (i / maxNi) * plotHeight;
                ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(canvas.width - margin, y); ctx.stroke();
                if (i > 0) ctx.fillText(i, margin - 20, y + 4);
            }

            // Hovedakser
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin, margin);
            ctx.lineTo(margin, canvas.height - margin);
            ctx.lineTo(canvas.width - margin, canvas.height - margin);
            ctx.stroke();

            // Aksetitler og formler fra diagrammet ditt
            ctx.fillStyle = "black";
            ctx.font = "bold 14px Arial";
            // Oppdatert formel for Kromekvivalent (inkl Nb)
            ctx.fillText("Kromekvivalent = % Cr + % Mo + 1,5 x % Si + 0,5 x % Nb", canvas.width / 2 - 170, canvas.height - 10);
            ctx.save();
            ctx.translate(15, canvas.height / 2 + 100);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText("Nikkelekvivalent = % Ni + 30 x % C + 0,5 x % Mn", 0, 0);
            ctx.restore();

            // Diagramtittel
            ctx.font = "bold 16px Arial";
            ctx.fillText("Schaeffler-diagram", canvas.width / 2 - 80, 20);
        }

        function updateDiagram() {
            // Beregn ekvivalenter (inkludert Nb)
            const crEq = elements.Cr.value + elements.Mo.value + 1.5 * elements.Si.value + 0.5 * elements.Nb.value;
            const niEq = elements.Ni.value + 30 * elements.C.value + 0.5 * elements.Mn.value;

            document.getElementById('crEqOut').innerText = crEq.toFixed(2);
            document.getElementById('niEqOut').innerText = niEq.toFixed(2);

            // Tøm canvas og tegn alt på nytt
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPhases(); // Først fasedelinger (sorte linjer)
            drawGrid(); // Så akser og tittel

            // Plott resultatet (rødt punkt)
            const coords = getCoords(crEq, niEq);
            ctx.beginPath();
            ctx.arc(coords.x, coords.y, 8, 0, 2 * Math.PI);
            ctx.fillStyle = "#e74c3c"; // Rød farge for punktet
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#c0392b"; // Mørkere rød kant
            ctx.stroke();

            // Etikett ved siden av punktet
            ctx.fillStyle = "#000";
            ctx.font = "bold 13px Arial";
            
            // Juster tekstposisjon hvis den er nær høyre kant
            let textX = coords.x + 12;
            if(crEq > 35) textX = coords.x - 70;
            ctx.fillText(`(${crEq.toFixed(1)}, ${niEq.toFixed(1)})`, textX, coords.y - 12);
        }

        // Kjør første gang
        updateDiagram();
    </script>
</body>
</html>
