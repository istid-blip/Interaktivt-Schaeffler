<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interaktivt Schaeffler-diagram</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #e2e8f0;
      --grid: #e5e7eb;
      --axis: #0f172a;
      --accent: #111827;
      --accent-soft: rgba(17, 24, 39, 0.12);
      --blue: rgba(59,130,246,0.18);
      --blue-stroke: rgba(59,130,246,0.8);
      --green: rgba(16,185,129,0.18);
      --green-stroke: rgba(16,185,129,0.8);
      --red: rgba(239,68,68,0.18);
      --red-stroke: rgba(239,68,68,0.8);
      --amber: rgba(245,158,11,0.18);
      --amber-stroke: rgba(245,158,11,0.8);
      --purple: rgba(168,85,247,0.16);
      --purple-stroke: rgba(168,85,247,0.8);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      padding: 24px;
    }

    .container {
      max-width: 1380px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: clamp(1.8rem, 2.6vw, 2.6rem);
      line-height: 1.1;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      max-width: 980px;
      line-height: 1.5;
    }

    .formula-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .pill {
      background: #eef2ff;
      color: #1e293b;
      border: 1px solid #dbeafe;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.95rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }

    .card-head h2 {
      margin: 0 0 6px 0;
      font-size: 1.2rem;
    }

    .card-head p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .card-body {
      padding: 18px 20px 20px;
    }

    .fields {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .field-top label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .value-tag {
      font-size: 0.9rem;
      color: var(--muted);
      min-width: 66px;
      text-align: right;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 94px;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #0f172a;
      cursor: pointer;
    }

    input[type="number"] {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: white;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .stat .label {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .result {
      margin-top: 12px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .result .label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .result .value {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .note {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.05s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:hover { opacity: 0.95; }
    button:active { transform: translateY(1px); }

    .btn-primary {
      background: #0f172a;
      color: white;
    }

    .btn-secondary {
